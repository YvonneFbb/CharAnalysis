{% extends "layout.html" %}
{% block title %}Paddle 复核{% endblock %}
{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/paddle_review.css') }}">
{% endblock %}
{% block content %}
<div class="container">
  <h1>Paddle 复核</h1>
  <div class="auto-wrap">
    <aside class="auto-sidebar">
      <div>
        <label>选择书籍：</label>
        <select id="book-select"></select>
      </div>
      <div class="stack-top-sm">
        <input id="char-filter" class="filter-input" type="text" placeholder="过滤字符..."/>
      </div>
      <div class="char-list stack-top-sm" id="char-list"></div>
    </aside>
    <main class="auto-main">
      <div class="toolbar">
        <div id="char-title">请选择一个字</div>
        <div class="stat" id="char-stat"></div>
      </div>
      <div id="grid" class="grid"></div>
    </main>
  </div>
</div>
{% endblock %}
{% block scripts %}
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dom.js') }}"></script>
  <script src="{{ url_for('static', filename='js/paddle_review.js') }}"></script>
{% endblock %}
