<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review 阶段</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/segment_review.css') }}">
</head>
<body>
    <div class="container">
        <h1>Review 阶段</h1>

        <!-- 控制面板 -->
        <div class="controls">
            <div class="control-group">
                <label for="book-select">选择书籍：</label>
                <select id="book-select">
                    <option value="">-- 请选择书籍 --</option>
                </select>
            </div>

            <div class="control-group">
                <label>进度统计：</label>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">总字符</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-item stat-item-confirmed">
                        <div class="stat-label">已确认</div>
                        <div class="stat-value" id="stat-confirmed">0</div>
                    </div>
                    <div class="stat-item stat-item-muted">
                        <div class="stat-label">未审查</div>
                        <div class="stat-value" id="stat-unreviewed">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 字符列表 -->
        <div class="char-list" id="char-list">
            <p class="empty-placeholder">请先选择书籍</p>
        </div>
    </div>

    <!-- 审查模态窗口 -->
    <div class="modal" id="review-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">审查切割结果</h2>
                <button class="close-btn" id="close-review-modal-btn">&times;</button>
            </div>

            <div class="modal-body">
                <!-- 主内容区 -->
                <div class="main-content">
                    <!-- 实例信息 -->
                    <div class="instance-info" id="instance-info">
                        <span class="status-badge loading">加载中...</span>
                    </div>

                    <!-- 图片展示 -->
                    <div class="images-grid">
                        <div class="image-box">
                            <div class="image-label">原始 ROI</div>
                            <div class="image-container" id="roi-container">
                                <span class="loading-text">加载中...</span>
                            </div>
                        </div>
                        <div class="image-box">
                            <div class="image-label">切割结果</div>
                            <div class="image-container" id="segmented-container">
                                <span class="loading-text">加载中...</span>
                            </div>
                        </div>
                        <div class="image-box">
                            <div class="image-label">调试可视化</div>
                            <div class="image-container" id="debug-container">
                                <span class="loading-text">加载中...</span>
                            </div>
                        </div>
                    </div>

                    <!-- 图片大小控制 -->
                    <div class="image-size-control">
                        <label for="image-size-slider">图片大小: <span id="image-size-value">300</span>%</label>
                        <input type="range" id="image-size-slider" min="50" max="600" value="300" step="10">
                    </div>

                    <!-- 操作按钮 -->
                    <div class="actions">
                        <button class="btn btn-primary" id="confirm-segmentation-btn">✓ 确认通过</button>
                        <button class="btn btn-warning" id="mark-not-needed-btn">✗ 标记不需要</button>
                        <button class="btn" id="toggle-manual-adjust-btn">🛠️ 手动调整</button>
                        <button class="btn" id="unconfirm-segmentation-btn">↩︎ 取消通过</button>
                    </div>

                    <!-- 手动调整面板（合并 Bbox + 画笔） -->
                    <div class="manual-adjust-panel is-hidden" id="manual-adjust-panel">
                        <div class="manual-adjust-content">
                            <div class="manual-slider-column" id="bbox-slider-panel">
                                <h4 class="manual-section-title">🎯 Bbox 边界框调整</h4>
                                <div class="manual-slider-groups">
                                    <div class="bbox-slider-group">
                                        <div class="bbox-slider-label">
                                            <span>Left（左边界）</span>
                                            <span class="bbox-slider-value" id="bbox-left-value">0</span>
                                        </div>
                                        <input type="range" id="bbox-left-slider" class="bbox-slider" min="0" max="100" value="0" step="1">
                                        <div class="bbox-slider-error" id="bbox-left-error"></div>
                                    </div>

                                    <div class="bbox-slider-group">
                                        <div class="bbox-slider-label">
                                            <span>Right（右边界）</span>
                                            <span class="bbox-slider-value" id="bbox-right-value">100</span>
                                        </div>
                                        <input type="range" id="bbox-right-slider" class="bbox-slider" min="0" max="100" value="100" step="1">
                                        <div class="bbox-slider-error" id="bbox-right-error"></div>
                                    </div>

                                    <div class="bbox-slider-group">
                                        <div class="bbox-slider-label">
                                            <span>Top（上边界）</span>
                                            <span class="bbox-slider-value" id="bbox-top-value">0</span>
                                        </div>
                                        <input type="range" id="bbox-top-slider" class="bbox-slider" min="0" max="100" value="0" step="1">
                                        <div class="bbox-slider-error" id="bbox-top-error"></div>
                                    </div>

                                    <div class="bbox-slider-group">
                                        <div class="bbox-slider-label">
                                            <span>Bottom（下边界）</span>
                                            <span class="bbox-slider-value" id="bbox-bottom-value">100</span>
                                        </div>
                                        <input type="range" id="bbox-bottom-slider" class="bbox-slider" min="0" max="100" value="100" step="1">
                                        <div class="bbox-slider-error" id="bbox-bottom-error"></div>
                                    </div>
                                </div>

                                <div class="bbox-info-display">
                                    <div>当前 Bbox:</div>
                                    <div>x = <span id="bbox-x">0</span>, y = <span id="bbox-y">0</span></div>
                                    <div>width = <span id="bbox-width">100</span>, height = <span id="bbox-height">100</span></div>
                                </div>
                            </div>

                            <div class="manual-preview-column">
                                <div class="bbox-preview-container">
                                    <canvas id="bbox-base-canvas"></canvas>
                                    <canvas id="bbox-overlay-canvas"></canvas>
                                    <canvas id="brush-canvas"></canvas>
                                </div>

                                <div class="brush-controls" id="brush-panel">
                                    <div class="brush-tool-group">
                                        <span class="brush-tool-label">🖌️ 画笔颜色:</span>
                                        <button class="brush-btn brush-btn-black" id="brush-black">⬛ 黑色</button>
                                        <button class="brush-btn brush-btn-white active" id="brush-white">⬜ 白色</button>
                                    </div>
                                    <div class="brush-tool-group brush-tool-group-spacious">
                                        <span class="brush-tool-label">画笔粗细:</span>
                                        <input type="range" id="brush-size-slider" class="range-input range-input-compact" min="1" max="20" step="1" value="2">
                                        <span id="brush-size-value">2</span> px
                                    </div>
                                    <div class="brush-tool-group">
                                        <button class="brush-btn" id="undo-brush-btn" title="撤销">↶ 撤销</button>
                                        <button class="brush-btn" id="redo-brush-btn" title="重做">↷ 重做</button>
                                        <button class="brush-btn" id="clear-brush-btn" title="清空">🗑️ 清空</button>
                                    </div>
                                </div>

                                <!-- 收边参数控制 -->
                                <div class="brush-controls stack-top-sm" id="shrink-panel">
                                    <div class="brush-tool-group brush-tool-group-spacious">
                                        <span class="brush-tool-label">收边阈值(灰度≤阈值视为墨迹):</span>
                                        <input type="range" id="shrink-threshold-slider" class="range-input range-input-wide" min="0" max="255" step="1" value="220">
                                        <span id="shrink-threshold-value">220</span>
                                    </div>
                                    <div class="brush-tool-group brush-tool-group-spacious">
                                        <span class="brush-tool-label">留白像素:</span>
                                        <input type="range" id="shrink-padding-slider" class="range-input range-input-wide" min="0" max="10" step="1" value="1">
                                        <span id="shrink-padding-value">1</span> px
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="manual-adjust-actions">
                            <button class="btn" id="shrink-bbox-btn" title="在当前框内自动收缩至墨迹">↘ 收边</button>
                            <button class="btn btn-primary" id="apply-manual-changes-btn">✓ 应用</button>
                            <button class="btn" id="cancel-manual-adjustment-btn">✗ 取消</button>
                        </div>
                    </div>

                    <!-- 分页导航 -->
                    <div class="pagination">
                        <button id="prev-btn">← 上一个实例</button>
                        <span id="page-info">1 / 1</span>
                        <button id="next-btn">下一个实例 →</button>
                    </div>
                </div>

                <!-- 左侧参数调整栏 -->
                <div class="sidebar">
                    <div class="sidebar-header">
                        <h3>⚙️ 参数调整</h3>
                    </div>
                    <div class="sidebar-content" id="params-content">
                        <!-- 参数会通过 JS 动态生成 -->
                    </div>
                    <div class="sidebar-footer">
                        <button class="btn btn-primary button-full-width" id="apply-custom-params-btn">
                            🔄 应用参数并重新切割
                        </button>
                        <div class="stack-top-sm">
                            <button class="btn button-full-width" id="reset-params-btn">
                                ↺ 恢复默认参数
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/segment_review_params.js') }}"></script>
    <script src="{{ url_for('static', filename='js/segment_review_app.js') }}"></script>
</body>
</html>
