<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古籍字形审查系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ocr_review.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>古籍字形审查系统</h1>
            <p>基于《大字结构八十四法》标准字集的字形审查工具</p>
            <div class="header-actions">
                <button class="btn-header" id="export-results-btn">💾 导出审查结果</button>
                <button class="btn-header" id="import-results-btn">📁 导入审查结果</button>
                <input type="file" id="import-file" class="hidden-input" accept=".json">
            </div>
        </div>

        <div class="content">
            <div class="book-selector">
                <label for="book-select">选择书籍：</label>
                <select id="book-select">
                    <option value="">-- 加载中... --</option>
                </select>
            </div>

            <div class="book-info" id="book-info">
                <span class="stat">标准字：<strong id="stat-chars">0</strong> 个</span>
                <span class="stat">总实例：<strong id="stat-instances">0</strong> 个</span>
                <span class="stat">已审查：<strong id="stat-reviewed">0</strong> 个字符</span>
                <span class="stat">进度：<strong id="stat-progress">0%</strong></span>
            </div>

            <div class="methods-container" id="methods-container">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <div class="modal" id="review-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">审查字符</h2>
                <button class="close-btn" id="close-review-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="loading" id="modal-loading">加载中...</div>
                <div class="instances-grid is-hidden" id="instances-grid"></div>
            </div>
            <div class="modal-footer">
                <div class="pagination" id="pagination">
                    <button id="prev-page">上一页</button>
                    <span id="page-info">第 1/1 页</span>
                    <button id="next-page">下一页</button>
                    <label class="sort-toggle sort-toggle-wide">
                        <input type="checkbox" id="sort-width-toggle">
                        按宽度排序
                    </label>
                    <label class="sort-toggle sort-toggle-narrow">
                        <input type="checkbox" id="sort-paddle-toggle">
                        按 Paddle 排序
                    </label>
                </div>
                <div class="actions">
                    <button class="btn-clear-all" id="clear-selections-btn">取消全部选择</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ocr_review_store.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ocr_review.js') }}"></script>
</body>
</html>
