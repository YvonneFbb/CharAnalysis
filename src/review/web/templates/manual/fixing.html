{% extends "layout.html" %}
{% block title %}问题集中处理（Fixing）{% endblock %}
{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/fixing.css') }}">
{% endblock %}
{% block content %}
<div class="container">
  <h1>问题集中处理（Fixing）</h1>
  <div class="fixing-wrap">
    <aside class="fixing-sidebar">
      <div>
        <label>选择书籍：</label>
        <select id="book-select"></select>
      </div>
      <div class="stack-top-sm">
        <label>灰度阈值：</label>
        <input id="bw-threshold" type="number" value="128" min="0" max="255"/>
      </div>
      <div class="stack-top-sm">
        <button id="reload-fixing-btn">刷新</button>
      </div>
    </aside>

    <main class="fixing-main">
      <div class="toolbar">
        <div id="summary">共 0 项</div>
        <div class="stat" id="fixed-box-stat"></div>
      </div>
      <div class="ocr-segment-buttons">
        <button class="btn" id="open-ocr-modal-btn">打开 OCR 筛选（当前书）</button>
        <button class="btn btn-primary" id="open-segment-modal-btn">打开切割审查列表</button>
      </div>
      <div class="montage-panel">
        <div class="toolbar montage-toolbar">
          <span class="stat">Montage 预览</span>
          <button class="btn" id="refresh-montage-btn">刷新</button>
        </div>
        <img id="montage-img" alt="montage" src="" />
      </div>
      <div id="grid" class="grid"></div>
      <div class="missing-section">
        <div class="missing-header">
          <strong>未出现的字</strong>
          <span class="missing-summary" id="missing-summary">共 0 个</span>
        </div>
        <div id="missing-grid" class="missing-grid"></div>
      </div>
    </main>
  </div>

  <div class="iframe-modal" id="ocr-modal">
    <div class="iframe-container">
      <div class="iframe-header">
        <strong>第一轮 OCR 筛选</strong>
        <div class="spacer"></div>
        <button class="btn" id="refresh-ocr-frame-btn">刷新</button>
        <button class="close-btn" id="close-ocr-modal-btn">&times;</button>
      </div>
      <div class="iframe-body">
        <iframe id="ocr-frame" src=""></iframe>
      </div>
    </div>
  </div>

  <div class="iframe-modal" id="segment-modal">
    <div class="iframe-container">
      <div class="iframe-header">
        <strong>第二轮切割审查</strong>
        <div class="spacer"></div>
        <button class="btn" id="refresh-segment-frame-btn">刷新</button>
        <button class="close-btn" id="close-segment-modal-btn">&times;</button>
      </div>
      <div class="iframe-body">
        <iframe id="segment-frame" src=""></iframe>
      </div>
    </div>
  </div>

  <div class="iframe-modal montage-modal" id="montage-modal">
    <div class="iframe-container montage-container">
      <div class="iframe-header montage-header">
        <strong>Montage 放大</strong>
        <div class="spacer"></div>
        <button class="close-btn" id="close-montage-modal-btn">&times;</button>
      </div>
      <div class="iframe-body montage-body">
        <img id="montage-modal-img" alt="montage large" src="" />
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dom.js') }}"></script>
  <script src="{{ url_for('static', filename='js/fixing.js') }}"></script>
{% endblock %}
